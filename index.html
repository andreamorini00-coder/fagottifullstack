<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fagotti Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{
  --ink:#111827;
  --viola:#7c3aed;
  --viola-soft:#ede9fe;
  --oro:#c9a84c;
  --oro-soft:#faf3e0;
  --paper:#faf8f3;
  --card:#ffffff;
  --line:#e5e7eb;
  --grigio:#6b7280;
  --ok:#16a34a;
  --ok-soft:#dcfce7;
  --warn:#d97706;
  --warn-soft:#fef3c7;
  --err:#dc2626;
  --err-soft:#fee2e2;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Bricolage Grotesque',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:70px;
}
input,select,textarea,button{font-family:'DM Mono',monospace;font-size:14px}
h1,h2,h3,h4{font-family:'Bricolage Grotesque',sans-serif}

/* ---------- Header ---------- */
header{
  background:var(--ink);
  color:#fff;
  padding:14px 16px 10px;
  position:sticky;top:0;z-index:50;
}
header .brand{display:flex;align-items:center;justify-content:space-between}
header .brand h1{font-size:19px;font-weight:800;letter-spacing:-.3px}
header .brand h1 span{color:var(--oro)}
header .brand .sub{font-family:'DM Mono',monospace;font-size:11px;color:#9ca3af}
.tabbar{
  display:flex;gap:6px;overflow-x:auto;margin-top:10px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;background:transparent;color:#d1d5db;border:1px solid #374151;
  border-radius:999px;padding:7px 13px;font-size:12.5px;cursor:pointer;white-space:nowrap;
}
.tab.active{background:var(--viola);border-color:var(--viola);color:#fff;font-weight:500}

/* ---------- Layout ---------- */
main{max-width:760px;margin:0 auto;padding:16px}
.view{display:none}
.view.show{display:block}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:14px;margin-bottom:12px;
}
.card h3{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.muted{color:var(--grigio);font-size:12.5px}
.riga{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.riga>*{flex:1;min-width:110px}
.riga>.fisso{flex:0 0 auto;min-width:0}

/* ---------- Controls ---------- */
input[type=text],input[type=tel],input[type=number],input[type=date],input[type=time],select,textarea{
  width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;
  background:#fff;color:var(--ink);
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--viola-soft);border-color:var(--viola)}
textarea{resize:vertical;min-height:70px}
label.lbl{display:block;font-size:11.5px;color:var(--grigio);margin:8px 0 4px;font-family:'DM Mono',monospace}
.btn{
  background:var(--viola);color:#fff;border:none;border-radius:8px;
  padding:10px 14px;cursor:pointer;font-size:13.5px;font-weight:500;
}
.btn:active{transform:scale(.98)}
.btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line)}
.btn.oro{background:var(--oro);color:var(--ink)}
.btn.rosso{background:var(--err-soft);color:var(--err)}
.btn.verde{background:var(--ok);color:#fff}
.btn.mini{padding:6px 10px;font-size:12px}
.btn.blocco{width:100%;margin-top:8px}

/* ---------- Badge & chips ---------- */
.badge{
  display:inline-block;font-family:'DM Mono',monospace;font-size:10.5px;
  padding:3px 8px;border-radius:999px;background:var(--viola-soft);color:var(--viola);
}
.badge.oro{background:var(--oro-soft);color:#8a6d1f}
.badge.ok{background:var(--ok-soft);color:var(--ok)}
.badge.warn{background:var(--warn-soft);color:var(--warn)}
.badge.err{background:var(--err-soft);color:var(--err)}
.badge.grigio{background:#f3f4f6;color:var(--grigio)}
.badge.mat{background:#dcfce7;color:#166534}
.badge.pom{background:#fee2e2;color:#991b1b}
.badge.t3{background:#1e3a8a;color:#dbeafe}
.badge.t4{background:#ede9fe;color:#5b21b6}
.badge.t5{background:#ffedd5;color:#9a3412}
.badge.ferie{background:#f3f4f6;color:#9ca3af}
.turno-riga .fascia{flex:0 0 4px;align-self:stretch;border-radius:2px;min-height:34px}
.fascia.mat{background:#22c55e}
.fascia.pom{background:#ef4444}
.fascia.t3{background:#1e3a8a}
.fascia.t4{background:#7c3aed}
.fascia.t5{background:#f59e0b}
.fascia.ferie{background:#d1d5db}
.chip{
  display:inline-flex;align-items:center;gap:5px;background:var(--viola-soft);color:var(--viola);
  border-radius:999px;padding:4px 10px;font-size:12px;font-family:'DM Mono',monospace;margin:2px 3px 2px 0;
}
.chip.off{background:#f3f4f6;color:#9ca3af;text-decoration:line-through}
.chip button{background:none;border:none;color:inherit;cursor:pointer;font-size:13px;padding:0}

/* ---------- KPI ---------- */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
.kpi{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  padding:12px;cursor:pointer;
}
.kpi .num{font-size:26px;font-weight:800;font-family:'DM Mono',monospace}
.kpi .num.viola{color:var(--viola)}
.kpi .num.oro{color:var(--oro)}
.kpi .lab{font-size:11.5px;color:var(--grigio);margin-top:2px}

/* ---------- Feed eventi ---------- */
.evento{
  display:flex;gap:10px;padding:10px 2px;border-bottom:1px dashed var(--line);align-items:flex-start;
}
.evento:last-child{border-bottom:none}
.evento .ico{
  flex:0 0 34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:16px;background:var(--viola-soft);
}
.evento .ico.oro{background:var(--oro-soft)}
.evento .ico.ok{background:var(--ok-soft)}
.evento .ico.err{background:var(--err-soft)}
.evento .txt{font-size:13.5px;line-height:1.35}
.evento .ora{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--grigio);margin-top:2px}

/* ---------- Liste generiche ---------- */
.item{
  border:1px solid var(--line);border-radius:var(--r);padding:11px;margin-bottom:9px;background:#fff;
}
.item .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.item .nome{font-weight:700;font-size:14.5px}
.item .dett{font-size:12.5px;color:var(--grigio);margin-top:3px;font-family:'DM Mono',monospace}
.item .azioni{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}

/* ---------- Turni ---------- */
.turno-riga{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed var(--line)}
.turno-riga:last-child{border-bottom:none}
.turno-riga .dip{flex:1;font-weight:600;font-size:14px}
.turno-riga select{flex:0 0 150px}
.legenda{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}

/* ---------- Sub-tabs (HACCP) ---------- */
.subtabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.subtab{
  background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 12px;
  font-size:12.5px;cursor:pointer;white-space:nowrap;
}
.subtab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ---------- Allergeni ---------- */
.all-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}
.all-check{
  display:flex;align-items:center;gap:7px;font-size:12.5px;padding:7px 9px;
  border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;
}
.all-check input{width:auto}
.all-check.on{border-color:var(--viola);background:var(--viola-soft)}

/* ---------- Vista cliente ---------- */
body.cliente{padding-bottom:110px}
.cliente-hero{
  background:var(--ink);color:#fff;padding:26px 18px;text-align:center;
}
.cliente-hero h1{font-size:24px;font-weight:800}
.cliente-hero h1 span{color:var(--oro)}
.cliente-hero p{color:#9ca3af;font-size:13px;margin-top:4px;font-family:'DM Mono',monospace}
.prodotto-card{
  background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;
}
.prodotto-card .pnome{font-weight:800;font-size:16.5px}
.prodotto-card .pprezzo{font-family:'DM Mono',monospace;color:var(--viola);font-weight:500;font-size:15px}
.gusti{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.gusto{
  border:1.5px solid var(--line);border-radius:999px;padding:6px 13px;font-size:12.5px;
  cursor:pointer;background:#fff;font-family:'DM Mono',monospace;
}
.gusto.sel{border-color:var(--viola);background:var(--viola-soft);color:var(--viola);font-weight:500}
.qta-box{display:flex;align-items:center;gap:10px}
.qta-box button{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:#fff;
  font-size:17px;cursor:pointer;
}
.qta-box .q{font-family:'DM Mono',monospace;font-weight:500;min-width:22px;text-align:center}
.carrello-bar{
  position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:#fff;
  padding:13px 16px;display:flex;justify-content:space-between;align-items:center;z-index:60;
}
.carrello-bar .tot{font-family:'DM Mono',monospace;font-size:15px}
footer.firma{
  text-align:center;padding:20px;font-family:'DM Mono',monospace;font-size:10.5px;color:#9ca3af;
}

/* ---------- Login ---------- */
#login{
  position:fixed;inset:0;background:var(--ink);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;
}
#login.hidden{display:none}
#login h1{color:#fff;font-size:26px;font-weight:800}
#login h1 span{color:var(--oro)}
#login input{max-width:280px;text-align:center;font-size:16px;padding:12px}
#login .btn{max-width:280px;width:100%;padding:12px;font-size:15px}
#login .lerr{color:#fca5a5;font-family:'DM Mono',monospace;font-size:12px;min-height:16px}

/* ---------- Toast ---------- */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;
  font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;
  font-family:'DM Mono',monospace;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis;
}
#toast.on{opacity:1}

/* ---------- Stampa etichetta ---------- */
#printArea{display:none}
@media print{
  body>*:not(#printArea){display:none !important}
  #printArea{display:block;padding:10mm}
  .etichetta{
    border:2px solid #000;border-radius:6px;padding:8mm;max-width:110mm;font-family:sans-serif;
  }
  .etichetta h2{font-size:16pt;margin-bottom:4mm}
  .etichetta .ingr{font-size:9pt;margin-bottom:3mm}
  .etichetta .allg{font-size:10pt;font-weight:bold}
  .etichetta .ditta{font-size:8pt;margin-top:4mm;color:#333}
  .foglio{font-family:sans-serif;color:#000}
  .foglio h1{font-size:15pt;margin-bottom:1mm}
  .foglio .sotto{font-size:9pt;color:#333;margin-bottom:5mm}
  .foglio h2{font-size:12pt;margin:5mm 0 2mm;border-bottom:1.5pt solid #000;padding-bottom:1mm}
  .foglio .voce{font-size:10pt;padding:1.6mm 0;border-bottom:0.4pt solid #999;page-break-inside:avoid}
  .foglio .voce .box{display:inline-block;width:4mm;height:4mm;border:1pt solid #000;margin-right:2.5mm;vertical-align:middle}
  .foglio .voce b{font-size:10.5pt}
  .foglio .voce .sub{font-size:8.5pt;color:#333;margin-left:6.5mm}
  .foglio .tot{font-size:9pt;font-weight:bold;color:#000}
}
@media(min-width:640px){
  .kpi-grid{grid-template-columns:repeat(4,1fr)}
  .all-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>

function carica(){
  try{
    var raw = localStorage.getItem(KEY);
    if(!raw) return statoDefault();
    var s = JSON.parse(raw);
    var d = statoDefault();
    for(var k in d){ if(s[k] === undefined) s[k] = d[k]; }
    for(var ks in d.settings){ if(s.settings[ks] === undefined) s.settings[ks] = d.settings[ks]; }
    if(s.settings.urlOrdini === undefined && s.settings.urlHub) s.settings.urlOrdini = s.settings.urlHub;
    delete s.settings.urlHub;
    if(!s.puliziaShop1){
      s.prodotti = (s.prodotti||[]).filter(function(p){
        var seedNegozio = String(p.id).indexOf('sd') === 0 && p.cat === 'negozio';
        var personalizzato = p.foto || p.stripe || (p.formati && p.formati.length);
        return !(seedNegozio && !personalizzato);
      });
      s.puliziaShop1 = true;
    }
    if(s.botCat && s.botCat.costoConsegna !== undefined){
      if(s.botCat.consegnaVicino === undefined) s.botCat.consegnaVicino = s.botCat.costoConsegna;
      if(s.botCat.consegnaLontano === undefined) s.botCat.consegnaLontano = 15;
      delete s.botCat.costoConsegna;
    }
    if(s.shopSped && s.shopSped.fasce){
      s.shopSped = { attiva:!!s.shopSped.attiva,
        roma:(s.shopSped.fasce[0] ? s.shopSped.fasce[0].costo : 5),
        fuori:(s.shopSped.fasce[1] ? s.shopSped.fasce[1].costo : 9) };
    }
    if(!s.bot || !s.bot.templates) s.bot = d.bot;
    if(!s.haccp) s.haccp = d.haccp;
    return s;
  }catch(e){ return statoDefault(); }
}

/* ---------- Helpers ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function esc(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

/* Date SEMPRE locali — mai toISOString() */
function dKey(d){
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function dLocDaKey(k){
  if(!k) return '';
  var p = k.split('-');
  if(p.length !== 3) return k;
  return p[2] + '/' + p[1] + '/' + p[0];
}
function oraLoc(ts){
  var d = new Date(ts);
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') +
    ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function oggiKey(){ return dKey(new Date()); }

function euro(n){ return Number(n||0).toFixed(2).replace('.',',') + ' €'; }

function telWa(t){
  var n = String(t||'').replace(/\D/g,'');
  if(n.length === 10 && n.charAt(0) === '3') n = '39' + n;
  return n;
}

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toast._t);
  toast._t = setTimeout(function(){ t.classList.remove('on'); }, 2200);
}

/* ---------- Eventi (feed dashboard) ---------- */
function evento(tipo, testo){
  state.eventi.unshift({ id:uid(), ts:Date.now(), tipo:tipo, testo:testo });
  if(state.eventi.length > 60) state.eventi.length = 60;
  salva();
  if(vistaCorrente === 'dashboard') render();
}

    if(vistaCorrente === 'dashboard' && !modCliente) renderDashboard();
  }, function(){ LIVE.errore = true; if(vistaCorrente==='dashboard' && !modCliente) renderDashboard(); });

  // Turni live dall'app turni-ferie (doc unico)
  db.collection("turni_app").doc("fagotti_pro").onSnapshot(function(doc){
    var d = doc.exists ? (doc.data() || {}) : {};
    LIVE.turni = d.turni || {};
    // Stessa configurazione dell'app Turni: 🟢 Mattina · 🔴 Pomeriggio · 🔵 Turno 3
    if(d.impostazioni && d.impostazioni.turni && d.impostazioni.turni.length) LIVE.turniConf = d.impostazioni.turni;
    if(d.impostazioni && d.impostazioni.dipendenti) LIVE.dipendenti = d.impostazioni.dipendenti;
    if(vistaCorrente === 'dashboard' && !modCliente) renderDashboard();
  }, function(){});

  // Ordini online dal bot WhatsApp / shop (collection separata 'ordini_online')
  db.collection("ordini_online").onSnapshot(function(snap){
    LIVE.ordiniOnline = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    if(vistaCorrente === 'dashboard' && !modCliente) renderDashboard();
  }, function(){});

  caricaCatalogoBot();
}

/* Legge bot_app/catalogo una volta sola (get, non onSnapshot: non deve
   sovrascrivere il form mentre lo stai compilando). */
function caricaCatalogoBot(){
  if(!db) return;
  db.collection("bot_app").doc("catalogo").get().then(function(doc){
    if(!doc.exists) return;
    var c = doc.data() || {};
    LIVE.catalogo = c;
    state.botCat.pageUrl = c.pageUrl || '';
    if(!state.botCat.caricato){
      state.botCat.caricato = true;
      state.botCat.waNumber = c.waNumber || '';
      state.botCat.shopUrl = c.shopUrl || '';
      if(c.costoConsegna !== undefined && c.costoConsegna !== null) state.botCat.consegnaVicino = c.costoConsegna;
      if(c.consegnaVicino !== undefined && c.consegnaVicino !== null) state.botCat.consegnaVicino = c.consegnaVicino;
      if(c.consegnaLontano !== undefined && c.consegnaLontano !== null) state.botCat.consegnaLontano = c.consegnaLontano;
      if(c.kgPersona) state.botCat.kgPersona = c.kgPersona;
      if(c.stimaMin) state.botCat.stimaMin = c.stimaMin;
      if(c.stimaMax) state.botCat.stimaMax = c.stimaMax;
      state.botCat.farciture = c.farciture || [];
      state.botCat.decorazioni = c.decorazioni || [];
      state.botCat.orari = c.orari || [];
      state.botCat.listino = (c.listino||[]).map(function(t){
        return { nome:t.nome, prezzoKg:Number(t.prezzoKg)||30, attivo:true };
      });
    }
    if(!state.botCat.listino.length) state.botCat.listino = listinoDaSeed();
    salva();
    if(vistaCorrente === 'bot' && !modCliente) renderBot();
  }).catch(function(){});
}

/* Se il catalogo online è vuoto, parto dalle torte già importate nella Suite */
function listinoDaSeed(){
  return state.prodotti.filter(function(p){ return p.cat === 'torta'; })
    .map(function(p){ return { nome:p.nome, prezzoKg:p.prezzo || 30, attivo:true }; });
}

/* Normalizza le chiavi turno 'Nome|YYYY-M-D' (mese/giorno non zero-padded)
   e restituisce chi lavora in una certa data locale. */
function turniDelGiorno(dataKey){
  var p = dataKey.split('-');
  var nonPad = p[0] + '-' + Number(p[1]) + '-' + Number(p[2]); // 2026-7-14
  var out = [];
  Object.keys(LIVE.turni).forEach(function(k){
    var parti = k.split('|');
    if(parti.length < 2) return;
    var d = parti[1].trim().split('-');
    if(d.length !== 3) return;
    var normDato = d[0] + '-' + Number(d[1]) + '-' + Number(d[2]);
    if(normDato !== nonPad) return;
    var v = LIVE.turni[k];
    var testo;
    if(v && v.tipo === 'F') testo = 'Ferie';
    else if(v && v.tipo === 'M') testo = 'Malattia';
    else if(v && v.tipo === 'PE') testo = 'Permesso' + (v.ore ? ' ' + v.ore + 'h' : '');
    else if(v && v.tipo === 'MT') testo = 'Maternità';
    else if(v && v.inizio) testo = v.inizio + '–' + v.fine;
    else testo = '—';
    var lavora = !!(v && v.inizio);
    var cls = classificaTurno(v);
    out.push({ nome:parti[0], testo:testo, lavora:lavora, colore:cls.colore,
      emoji:cls.emoji, etichetta:cls.nome, min:(lavora ? hhmmMin(v.inizio) : 9999) });
  });
  // Stato CCNL dalla scheda dipendente: maternità visibile anche senza turni segnati
  (LIVE.dipendenti||[]).forEach(function(d){
    if(!d || !d.statoCcnl) return;
    if(d.statoCcnl !== 'MT' && d.statoCcnl !== 'MA') return;
    if(out.some(function(o){ return o.nome === d.nome; })) return;
    var eti = d.statoCcnl === 'MA' ? 'Maternità anticipata' : 'Maternità';
    out.push({ nome:d.nome, testo:eti, lavora:false, colore:'ferie', emoji:'🤱', etichetta:eti, min:9999 });
  });
  // Chi è in allattamento e lavora oggi: nota sotto il nome
  out.forEach(function(o){
    var d = (LIVE.dipendenti||[]).find(function(x){ return x.nome === o.nome; });
    if(d && d.statoCcnl === 'AL' && o.lavora){
      o.etichetta = '🍼 Allattamento · max ' + (d.maxOreGiorno || 6) + 'h/g';
      o.emoji = o.emoji || '🍼';
    }
  });

  // Ordine cronologico: prima chi entra presto, in fondo ferie/malattia/permessi
  out.sort(function(a,b){
    if(a.min !== b.min) return a.min - b.min;
    return a.nome.localeCompare(b.nome);
  });
  return out;
}

function hhmmMin(s){
  var m = String(s||'').match(/^(\d{1,2}):(\d{2})$/);
  return m ? parseInt(m[1],10)*60 + parseInt(m[2],10) : 9999;
}

/* Assegna il turno confrontando l'ora di inizio con i turni configurati
   nell'app Turni: vince quello con l'inizio più vicino. */
function classificaTurno(v){
  if(!v || !v.inizio){
    if(v && v.tipo === 'F') return { colore:'ferie', emoji:'🏖️', nome:'Ferie' };
    if(v && v.tipo === 'M') return { colore:'ferie', emoji:'🤒', nome:'Malattia' };
    if(v && v.tipo === 'PE') return { colore:'ferie', emoji:'📄', nome:'Permesso' };
    if(v && v.tipo === 'MT') return { colore:'ferie', emoji:'🤱', nome:'Maternità' };
    return { colore:'ferie', emoji:'', nome:'' };
  }
  var min = hhmmMin(v.inizio);
  var best = null, bestD = 99999;
  (LIVE.turniConf || TURNI_DEFAULT).forEach(function(t){
    if(!t || !t.inizio) return;
    if(t.attivo === false) return;   // turni opzionali spenti
    var d = Math.abs(hhmmMin(t.inizio) - min);
    if(d < bestD){ bestD = d; best = t; }
  });
  if(!best) return { colore:'mat', emoji:'🟢', nome:'Mattina' };
  return { colore:best.colore || 'mat', emoji:best.emoji || '🟢',
    nome:best.nome || (best.colore === 'pom' ? 'Pomeriggio' : best.colore === 't3' ? 'Turno 3' : 'Mattina') };
}

  var boxOrdini = prossimi.length

      }).join('')
    : '<p class="muted">Nessun ordine in arrivo dall\'app Ordini.</p>';

  var boxOnline = online.length
    ? online.slice().sort(function(a,b){ return (b.creato||0) - (a.creato||0); }).slice(0,5).map(function(o){
        var cosa = o.torta ? esc(o.torta) + (o.persone ? ' · ' + esc(o.persone) + ' pers.' : '')
          : (o.articoli ? o.articoli.map(function(a){

            }).join(', ') : '');

function legendaTurni(){
  var voci = (LIVE.turniConf || TURNI_DEFAULT).filter(function(t){
    return t && t.inizio && !(t.attivo === false && t.colore === 't3');
  }).map(function(t){
    return '<span class="badge ' + (t.colore||'mat') + '">' + (t.emoji||'') + ' ' +
      esc(t.nome || '') + ' ' + esc(t.inizio) + '–' + esc(t.fine) + '</span>';
  }).join(' ');
  return voci ? '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">' + voci + '</div>' : '';
}

   TURNI
   ============================================================ */
var dataTurni = oggiKey();

function renderTurni(){
  var giorno = state.turni[dataTurni] || {};

    ? state.dipendenti.map(function(d){

        return '<div class="turno-riga">' +

          '<button class="btn mini rosso fisso" onclick="rimuoviDip(\'' + d.id + '\')">✕</button>' +
          '</div>';
      }).join('')
    : '<p class="muted">Aggiungi i dipendenti qui sotto per assegnare i turni.</p>';

  var legenda = ['M · Mattina','P · Pomeriggio','S · Sera','SP · Spezzato','R · Riposo','F · Ferie']
    .map(function(l){ return '<span class="badge grigio">' + l + '</span>'; }).join('');

  document.getElementById('v-turni').innerHTML =
    '<div class="card"><h3>↗ Turni & Ferie</h3>' +

      '<button class="btn oro blocco" onclick="apriApp(state.settings.urlTurni, true)">↗ Apri Turni &amp; Ferie completa</button>' +
    '</div>' +

  /* imposta i valori selezionati (dopo l'inserimento HTML) */

  });

function aggiungiDip(){

function rimuoviDip(id){

function setTurno(depId, codice){
  if(!state.turni[dataTurni]) state.turni[dataTurni] = {};
  state.turni[dataTurni][depId] = codice;
  salva();
  var dip = state.dipendenti.find(function(d){ return d.id === depId; });
  var nomeT = TURNI_CODICI[codice] || codice;
  evento('turno', 'Turno aggiornato: ' + (dip ? dip.nome : '?') + ' → ' + nomeT + ' (' + dLocDaKey(dataTurni) + ')');
  toast('Turno salvato');
}

/* ============================================================
   ORDINI
   ============================================================ */
var dataOrdini = oggiKey();

function descRighe(o){
  if(o.righe && o.righe.length){
    return o.righe.map(function(r){
      return r.qta + '× ' + r.nome + (r.variante ? ' (' + r.variante + ')' : '');
    }).join(', ');
  }
  return o.descrizione || '';
}

function totOrdine(o){
  if(!o.righe) return 0;
  return o.righe.reduce(function(t,r){ return t + (r.prezzo||0) * r.qta; }, 0);
}

/* ── Helper descrizione ordini, stessi formati dell'app Ordini ── */
function orMin(s){
  if(!s) return 9999;
  var m = String(s).match(/^(\d{1,2}):(\d{2})$/);
  return m ? parseInt(m[1],10)*60 + parseInt(m[2],10) : 9999;
}
function cKg(pers, gr){ return (Number(pers)||8) * (Number(gr)||150) / 1000; }
function pesoTorta(t){
  if(t.modo === 'kg') return t.peso || '1kg';
  if(t.modo === 'pz') return (t.pezzi||1) + ' pz';
  return (t.persone||8) + 'p (~' + cKg(t.persone, t.grammi).toFixed(2) + 'kg)';
}
function tLine(t){
  var l = '🎂 ' + esc(t.prodotto) + ' · ' + esc(pesoTorta(t));
  if(t.modo !== 'pz' && (t.qtaTorte||1) > 1) l += ' × ' + t.qtaTorte + ' torte';
  if(t.farcitura) l += ' | ' + esc(t.farcitura);
  if(t.decorazione) l += ' | ' + esc(t.decorazione);
  return l;
}
function sLine(s){
  var sw = (s.salModo === 'kg' || s.modo === 'kg')
    ? (s.salPeso || s.peso || '1kg')
    : ((s.salQta || s.qta || 1) + ' pz');
  return '🥗 ' + esc(s.salProdotto || s.prodotto) + ' · ' + esc(sw);
}
function righeOrdineFB(o){
  var r = [];
  if(o.prodotto) r.push(tLine({ prodotto:o.prodotto, modo:o.modo, peso:o.peso, persone:o.persone,

  if(o.torteExtra) o.torteExtra.forEach(function(t){ r.push(tLine(t)); });
  if(o.salProdotto) r.push(sLine(o));
  if(o.salatiExtra) o.salatiExtra.forEach(function(s){ r.push(sLine(s)); });
  return r;
}

/* ── Voci strutturate del giorno (per stampa raggruppata) ── */
function vociGiorno(dataKey){
  var voci = [];
  function estraiTorta(t, o){
    var extra = [];
    if(t.farcitura) extra.push('Farcitura: ' + t.farcitura);
    if(t.decorazione) extra.push('Decorazione: ' + t.decorazione);
    voci.push({ prodotto:(t.prodotto||'Torta'), det:pesoTorta(t),
      qta:(t.modo === 'pz' ? (t.pezzi||1) : (t.qtaTorte||1)),
      extra:extra.join(' · '), cliente:(o.cliente||o.nome||''), orario:(o.orario||''),
      consegna:!!o.consegna, note:(o.note||'') });
  }
  LIVE.ordini.forEach(function(o){
    if(o.data !== dataKey) return;
    if(o.prodotto) estraiTorta(o, o);
    (o.torteExtra||[]).forEach(function(t){ estraiTorta(t, o); });
    if(o.salProdotto) voci.push({ prodotto:o.salProdotto,
      det:((o.salModo === 'kg') ? (o.salPeso||'1kg') : ((o.salQta||1) + ' pz')),
      qta:(o.salModo === 'kg' ? 1 : (o.salQta||1)), extra:'',
      cliente:(o.cliente||''), orario:(o.orario||''), consegna:!!o.consegna, note:(o.note||'') });
    (o.salatiExtra||[]).forEach(function(s){
      voci.push({ prodotto:(s.salProdotto||s.prodotto||''),
        det:((s.salModo === 'kg' || s.modo === 'kg') ? (s.salPeso||s.peso||'1kg') : ((s.salQta||s.qta||1) + ' pz')),
        qta:((s.salModo === 'kg' || s.modo === 'kg') ? 1 : (s.salQta||s.qta||1)), extra:'',
        cliente:(o.cliente||''), orario:(o.orario||''), consegna:!!o.consegna, note:(o.note||'') });
    });
  });
  state.ordini.forEach(function(o){
    if(o.ritiro !== dataKey || o.stato === 'ritirato') return;
    if(o.righe && o.righe.length){
      o.righe.forEach(function(r){
        voci.push({ prodotto:r.nome, det:(r.qta + ' pz' + (r.variante ? ' · ' + r.variante : '')),
          qta:(r.qta||1), extra:'', cliente:(o.cliente||''), orario:(o.ora||''),
          consegna:false, note:(o.note||'') });
      });
    }else if(o.descrizione){
      voci.push({ prodotto:'Ordine manuale', det:o.descrizione, qta:1, extra:'',
        cliente:(o.cliente||''), orario:(o.ora||''), consegna:false, note:(o.note||'') });
    }
  });
  return voci;
}

function spostaGiorno(delta){
  var p = dataOrdini.split('-');

  d.setDate(d.getDate() + delta);
  dataOrdini = dKey(d);
  render();
}

function waTelefono(tel, cliente){

  window.open('https://wa.me/' + telWa(tel) + '?text=' + encodeURIComponent(testo), '_blank');
}

/* ── Foglio di produzione per il laboratorio ──
   modo 'crono': ordini in sequenza oraria (come l'app Ordini)
   modo 'prodotto': raggruppati per prodotto con totali (comodo in laboratorio) */
function stampaLaboratorio(modo){
  var voci = vociGiorno(dataOrdini);
  if(!voci.length){ toast('Nessun ordine da stampare per ' + dLocDaKey(dataOrdini)); return; }

  var intesta = '<h1>' + esc(state.settings.nome) + ' — Produzione del ' + dLocDaKey(dataOrdini) + '</h1>' +
    '<div class="sotto">' + voci.length + ' voci · stampato ' + oraLoc(Date.now()) +
    ' · vista ' + (modo === 'crono' ? 'cronologica' : 'per prodotto') + '</div>';

  var corpo = '';
  if(modo === 'crono'){
    var ordinate = voci.slice().sort(function(a,b){
      var d = orMin(a.orario) - orMin(b.orario);
      return d !== 0 ? d : a.cliente.localeCompare(b.cliente);
    });
    corpo = ordinate.map(function(v){
      return '<div class="voce"><span class="box"></span>' +
        '<b>' + (v.orario || '—:—') + '</b> · ' + esc(v.prodotto) + ' · ' + esc(v.det) +
        ' — ' + esc(v.cliente) + (v.consegna ? ' 🚚' : '') +
        ((v.extra || v.note) ? '<div class="sub">' + esc([v.extra, v.note].filter(Boolean).join(' · ')) + '</div>' : '') +
        '</div>';
    }).join('');
  }else{
    var gruppi = {};
    voci.forEach(function(v){
      var k = v.prodotto.trim().toLowerCase();
      if(!gruppi[k]) gruppi[k] = { nome:v.prodotto, voci:[], tot:0 };
      gruppi[k].voci.push(v);
      gruppi[k].tot += Number(v.qta) || 1;
    });
    corpo = Object.keys(gruppi).sort().map(function(k){
      var g = gruppi[k];
      var righe = g.voci.slice().sort(function(a,b){ return orMin(a.orario) - orMin(b.orario); })
        .map(function(v){
          return '<div class="voce"><span class="box"></span>' +
            esc(v.det) + ' — <b>' + esc(v.cliente) + '</b>' +
            (v.orario ? ' (' + v.orario + (v.consegna ? ', 🚚 consegna' : ', ritiro') + ')' : (v.consegna ? ' (🚚 consegna)' : '')) +
            ((v.extra || v.note) ? '<div class="sub">' + esc([v.extra, v.note].filter(Boolean).join(' · ')) + '</div>' : '') +
            '</div>';
        }).join('');
      return '<h2>' + esc(g.nome) + ' <span class="tot">· ' + g.tot + ' totali</span></h2>' + righe;
    }).join('');
  }

  document.getElementById('printArea').innerHTML = '<div class="foglio">' + intesta + corpo + '</div>';
  window.print();
}

function nuovoOrdineManuale(){
  var cliente = document.getElementById('omCliente').value.trim();
  var desc = document.getElementById('omDesc').value.trim();
  if(!cliente || !desc){ toast('Cliente e descrizione obbligatori'); return; }
  var o = {
    id:uid(), numero:numeroOrdine(), canale:'manuale', cliente:cliente,
    tel:document.getElementById('omTel').value.trim(),
    descrizione:desc, righe:null,
    ritiro:document.getElementById('omRitiro').value || '',
    ora:document.getElementById('omOra').value || '',
    totale:parseFloat(document.getElementById('omTot').value) || 0,
    note:'', stato:'nuovo', creato:Date.now()
  };
  state.ordini.unshift(o);
  salva();
  evento('ordine', 'Nuovo ordine ' + o.numero + ' (manuale): ' + cliente + ' — ' + desc.slice(0,60));
  render(); toast('Ordine salvato');
}

function avanzaOrdine(id){
  var o = state.ordini.find(function(x){ return x.id === id; });
  if(!o) return;
  var i = STATI_ORDINE.indexOf(o.stato);
  if(i < 0 || i >= STATI_ORDINE.length - 1) return;
  o.stato = STATI_ORDINE[i + 1];
  salva();
  evento('ordine', 'Ordine ' + (o.numero || 'di ' + (o.cliente||'cliente')) + ' → ' + o.stato);
  render();
}

function eliminaOrdine(id){
  if(!confirm('Eliminare questo ordine?')) return;
  state.ordini = state.ordini.filter(function(o){ return o.id !== id; });
  salva(); render();
}

function waOrdine(id){
  var o = state.ordini.find(function(x){ return x.id === id; });
  if(!o || !o.tel){ toast('Numero mancante'); return; }
  var tpl = o.stato === 'pronto' ? state.bot.templates[1] : state.bot.templates[0];
  var testo = compilaTemplate(tpl ? tpl.testo : 'Ciao {cliente}!', o);
  window.open('https://wa.me/' + telWa(o.tel) + '?text=' + encodeURIComponent(testo), '_blank');
}

        '<div><label class="lbl">Fuori Roma €</label><input type="number" class="sf-sped" data-z="fuori" step="0.5" min="0" value="' + (sped.fuori||0) + '"></div>' +

      '<p class="muted" style="margin-top:8px">La zona la decide il CAP del cliente al checkout: 00118–00199 = Roma città, tutto il resto = fuori Roma. Ritiro in negozio sempre gratuito.</p>' +
    '</div>';

}

function aggiornaZonaCap(){

  if(!el) return;
  var zona = zonaDaCap(document.getElementById('ckCap').value);
  if(!zona){ el.textContent = ''; return; }
  var costo = Number(zona === 'roma' ? SHOPCLI.spedizione.roma : SHOPCLI.spedizione.fuori) || 0;
  el.textContent = (zona === 'roma' ? '📍 Roma città' : '📍 Fuori Roma') + ' — spedizione ' + euro(costo);
}

/* CAP 00118–00199 = Roma città (regola gratuita, senza API) */
function zonaDaCap(cap){
  var c = String(cap||'').replace(/\D/g,'');
  if(c.length !== 5) return null;
  var n = Number(c);
  return (n >= 118 && n <= 199) ? 'roma' : 'fuori';
}

/* CRITICO (lezione togTorta): salvare i campi del form PRIMA di ogni re-render,
   altrimenti descrizioni/foto/prezzi digitati si perdono al primo click. */
function flushShopForm(){
  function ap(sel, fn){
    document.querySelectorAll(sel).forEach(function(inp){
      var p = state.prodotti.find(function(x){ return x.id === inp.dataset.pid; });
      if(p) fn(p, inp);
    });
  }
  ap('.sf-desc', function(p, inp){ p.desc = inp.value.trim(); });
  ap('.sf-foto', function(p, inp){ p.foto = inp.value.trim(); });
  ap('.sf-stripebase', function(p, inp){ p.stripe = inp.value.trim(); });
  ap('.sf-prezzo', function(p, inp){
    var i = Number(inp.dataset.i);
    if(p.formati && p.formati[i]) p.formati[i].prezzo = Number(inp.value) || 0;
  });
  ap('.sf-stripe', function(p, inp){
    var i = Number(inp.dataset.i);
    if(p.formati && p.formati[i]) p.formati[i].stripe = inp.value.trim();
  });
  document.querySelectorAll('.sf-sped').forEach(function(inp){
    var v = Number(inp.value);
    if(!isNaN(v)) state.shopSped[inp.dataset.z] = v;
  });
  salva();
}

function aggiungiFormato(pid){
  flushShopForm();
  var p = state.prodotti.find(function(x){ return x.id === pid; });
  if(!p) return;
  var nome = document.getElementById('fmt-n-' + pid).value.trim();
  var prezzo = Number(document.getElementById('fmt-p-' + pid).value);
  if(!nome || !prezzo){ toast('Nome e prezzo del formato obbligatori'); return; }
  p.formati = p.formati || [];

}

function rimuoviFormato(pid, i){

  p.formati.splice(i, 1);

/* Pubblica la vetrina su shop_app/catalogo (merge, con verifica in rilettura) */
function pubblicaShop(){
  flushShopForm();
  if(!db){ toast('Firebase non disponibile'); return; }
  var prodotti = state.prodotti.filter(function(p){ return p.cat === 'negozio' && p.attivo; })
    .map(function(p){
      return {
        nome:p.nome, desc:p.desc||'', foto:p.foto||'', prezzo:Number(p.prezzo)||0, um:p.um||'pz',
        gusti:(p.varianti||[]).filter(function(v){ return v.disp; }).map(function(v){ return v.nome; }),
        formati:(p.formati||[]).map(function(f){ return { nome:f.nome, prezzo:Number(f.prezzo)||0, stripe:f.stripe||'' }; }),
        stripe:p.stripe||''
      };
    });
  var payload = {
    prodotti:prodotti,
    spedizione:{
      attiva:!!state.shopSped.attiva,
      roma:Number(state.shopSped.roma)||0,
      fuori:Number(state.shopSped.fuori)||0
    },
    nome:state.settings.nome || 'Pasticceria Fagotti',
    waNumber:state.botCat.waNumber || '',
    aggiornato:Date.now()
  };
  db.collection('shop_app').doc('catalogo').set(payload, { merge:true })
    .then(function(){ return db.collection('shop_app').doc('catalogo').get(); })
    .then(function(doc){
      var d = doc.data() || {};
      if((d.prodotti||[]).length === prodotti.length){
        evento('shop', 'Vetrina pubblicata: ' + prodotti.length + ' prodotti online');
        toast('✅ Vetrina pubblicata — ' + prodotti.length + ' prodotti verificati');
        render();
      }else{
        toast('⚠️ Scritto ma non verificato, riprova');
      }
    })
    .catch(function(e){ toast('Errore: ' + e.message); });
}

function nuovoProdotto(){
  var nome = document.getElementById('npNome').value.trim();
  var prezzo = parseFloat(document.getElementById('npPrezzo').value) || 0;
  if(!nome){ toast('Il nome è obbligatorio'); return; }
  var varianti = document.getElementById('npVar').value.split(',')
    .map(function(v){ return v.trim(); })
    .filter(function(v){ return v; })
    .map(function(v){ return { nome:v, disp:true }; });
  /* split sulle virgole, ma "60,50" (decimale italiano) resta unito:
     i frammenti senza '=' vengono riattaccati alla voce precedente */
  var grezzi = document.getElementById('npFormati').value.split(',');
  var vociFmt = [];
  grezzi.forEach(function(t){
    if(t.indexOf('=') >= 0) vociFmt.push(t);
    else if(vociFmt.length && t.trim()) vociFmt[vociFmt.length-1] += ',' + t;
  });
  var formati = vociFmt.map(function(f){
      var parti = f.split('=');
      return { nome:parti[0].trim(), prezzo:parseFloat(String(parti[1]||'').trim().replace(',','.')) || 0, stripe:'' };
    })
    .filter(function(f){ return f.nome; });
  if(!formati.length && !prezzo){ toast('Metti un prezzo base o almeno un formato'); return; }
  state.prodotti.push({
    id:uid(), nome:nome, prezzo:prezzo, um:'pz', cat:'negozio',
    varianti:varianti, formati:formati,
    foto:document.getElementById('npFoto').value.trim(), desc:'', stripe:'',
    allergeni:[], ingredienti:'', attivo:true
  });
  salva();
  evento('shop', 'Nuovo prodotto: ' + nome + (varianti.length ? ' (' + varianti.length + ' gusti)' : ''));
  render(); toast('Prodotto creato');
}

/* ============================================================
   ALLERGENI + HACCP
   ============================================================ */
function renderAllergeni(){
  var tabs = [
    ['allergeni','⚠️ Allergeni'],
    ['temp','🌡️ Temperature'],
    ['sanif','🧽 Sanificazione'],
    ['scad','⏳ Scadenze']
  ].map(function(t){
    return '<button class="subtab' + (subHaccp === t[0] ? ' active' : '') + '" onclick="subHaccp=\'' + t[0] + '\';render()">' + t[1] + '</button>';
  }).join('');

  var corpo = '';
  if(subHaccp === 'allergeni') corpo = corpoAllergeni();
  else if(subHaccp === 'temp') corpo = corpoTemp();
  else if(subHaccp === 'sanif') corpo = corpoSanif();
  else corpo = corpoScad();

  document.getElementById('v-allergeni').innerHTML = '<div class="subtabs">' + tabs + '</div>' + corpo;
}

function corpoAllergeni(){
  var launcher = '<div class="card"><h3>↗ Etichette Allergeni Fagotti</h3>' +
    '<p class="muted">L\'app dedicata con ricerca veloce e stampa etichette a norma UE 1169/2011 — nessun login richiesto.</p>' +
    '<button class="btn oro blocco" onclick="apriApp(state.settings.urlAllergeni, false)">↗ Apri Allergeni & Etichette</button>' +
    '</div>';
  if(!state.prodotti.length){
    return launcher + '<div class="card"><p class="muted">Crea prima i prodotti nella sezione Shop: qui assegni gli allergeni e stampi le etichette.</p></div>';
  }
  var q = String(qAllerg||'').trim().toLowerCase();
  var ris = q.length >= 2
    ? state.prodotti.filter(function(p){ return p.nome.toLowerCase().indexOf(q) >= 0; }).slice(0, 8)
    : [];
  var sel = state.prodotti.find(function(p){ return p.id === allergSel; });

  var cerca = '<div class="card"><h3>🔎 Cerca prodotto</h3>' +
    '<p class="muted" style="margin-bottom:8px">Scrivi almeno 2 lettere (es. "Tiram" → Tiramisù) e tocca il risultato: l\'etichetta appare qui sotto. Per aggiungere o modificare prodotti usa l\'app Etichette qui sopra.</p>' +
    '<input type="text" id="inpAllerg" value="' + esc(qAllerg||'') + '" placeholder="Tiram…" oninput="filtraAllergeni(this.value)">' +
    '<div id="allergRis" style="margin-top:8px">' + risultatiAllergHTML(ris, q) + '</div>' +
    '</div>';

  return launcher + cerca + (sel ? cardProdottoAllergeni(sel) : '');
}

function risultatiAllergHTML(ris, q){
  if(String(q||'').trim().length < 2) return '<span class="muted">I prodotti restano nascosti finché non cerchi.</span>';
  if(!ris.length) return '<span class="muted">Nessun prodotto trovato per "' + esc(q) + '".</span>';
  return ris.map(function(p){
    return '<button class="chip" style="cursor:pointer" onclick="selezionaAllergene(\'' + p.id + '\')">' + esc(p.nome) + '</button>';
  }).join(' ');
}

/* Aggiorna SOLO i risultati, senza ridisegnare la pagina:
   così il campo di ricerca non perde il focus mentre scrivi. */
function filtraAllergeni(v){
  qAllerg = v;
  var q = String(v||'').trim().toLowerCase();
  var ris = q.length >= 2
    ? state.prodotti.filter(function(p){ return p.nome.toLowerCase().indexOf(q) >= 0; }).slice(0, 8)
    : [];
  var box = document.getElementById('allergRis');
  if(box) box.innerHTML = risultatiAllergHTML(ris, q);
}

function selezionaAllergene(pid){
  allergSel = pid;
  render();
}

function cardProdottoAllergeni(p){
  var checks = ALLERGENI.map(function(a,i){
    var on = (p.allergeni||[]).indexOf(i) >= 0;
    return '<label class="all-check' + (on?' on':'') + '">' +
      '<input type="checkbox"' + (on?' checked':'') + ' onchange="toggleAllergene(\'' + p.id + '\',' + i + ')">' +
      esc(a) + '</label>';
  }).join('');
  return '<div class="card"><h3>' + esc(p.nome) +
    ' <button class="btn mini sec fisso" style="margin-left:auto" onclick="allergSel=null;render()">✕ Chiudi</button></h3>' +
    '<label class="lbl">Ingredienti (per etichetta)</label>' +
    '<textarea onchange="setIngredienti(\'' + p.id + '\', this.value)" placeholder="Farina di grano tenero, burro, uova, zucchero...">' + esc(p.ingredienti||'') + '</textarea>' +
    '<div class="all-grid">' + checks + '</div>' +
    '<button class="btn oro blocco" onclick="stampaEtichetta(\'' + p.id + '\')">🖨️ Stampa etichetta</button>' +
    '</div>';
}

function toggleAllergene(pid, i){
  var p = state.prodotti.find(function(x){ return x.id === pid; });
  if(!p) return;
  p.allergeni = p.allergeni || [];
  var pos = p.allergeni.indexOf(i);
  if(pos >= 0) p.allergeni.splice(pos,1); else p.allergeni.push(i);
  salva(); render();
}

function setIngredienti(pid, val){
  var p = state.prodotti.find(function(x){ return x.id === pid; });
  if(!p) return;
  p.ingredienti = val.trim();
  salva();
  toast('Ingredienti salvati');
}

function stampaEtichetta(pid){
  var p = state.prodotti.find(function(x){ return x.id === pid; });
  if(!p) return;
  var nomiAll = (p.allergeni||[]).sort(function(a,b){return a-b;})
    .map(function(i){ return ALLERGENI[i]; }).join(', ');
  document.getElementById('printArea').innerHTML =
    '<div class="etichetta">' +
      '<h2>' + esc(p.nome) + '</h2>' +
      (p.ingredienti ? '<div class="ingr"><b>Ingredienti:</b> ' + esc(p.ingredienti) + '</div>' : '') +
      '<div class="allg">Allergeni: ' + (nomiAll ? esc(nomiAll) : 'nessuno dichiarato') + '</div>' +
      '<div class="ditta">' + esc(state.settings.nome) + (state.settings.tel ? ' · ' + esc(state.settings.tel) : '') +
        ' · Etichetta del ' + dLocDaKey(oggiKey()) + '</div>' +
    '</div>';
  window.print();
}

/* ---------- HACCP: Temperature ---------- */
function fuoriRange(punto, gradi){
  var g = Number(gradi);
  if(punto.indexOf('Frigo') === 0 || punto.indexOf('Vetrina') === 0) return g < 0 || g > 4;
  if(punto === 'Congelatore') return g > -18;
  if(punto === 'Laboratorio') return g > 26;
  return false; /* abbattitore: nessun controllo automatico */
}

function corpoTemp(){
  var puntiOpts = PUNTI_TEMP.map(function(p){ return '<option>' + p + '</option>'; }).join('');
  var righe = state.haccp.temp.slice(0,40).map(function(r){
    var fr = fuoriRange(r.punto, r.gradi);
    return '<div class="item"><div class="top"><div>' +
      '<div class="nome">' + esc(r.punto) + ' · ' + esc(r.gradi) + '°C ' +
        (fr ? '<span class="badge err">fuori range</span>' : '<span class="badge ok">conforme</span>') + '</div>' +
      '<div class="dett">' + oraLoc(r.ts) + (r.operatore ? ' · ' + esc(r.operatore) : '') + '</div>' +
      '</div></div></div>';
  }).join('') || '<p class="muted">Nessuna rilevazione registrata.</p>';

  return '<div class="card"><h3>🌡️ Nuova rilevazione</h3>' +
    '<div class="riga">' +
      '<div><label class="lbl">Punto di controllo</label><select id="tPunto">' + puntiOpts + '</select></div>' +
      '<div><label class="lbl">Temperatura °C</label><input type="number" id="tGradi" step="0.1" placeholder="3.5"></div>' +
    '</div>' +
    '<label class="lbl">Operatore</label><input type="text" id="tOp" placeholder="Nome operatore">' +
    '<button class="btn blocco" onclick="registraTemp()">Registra</button>' +
    '<p class="muted" style="margin-top:8px">Range: frigo e vetrina 0–4°C · congelatore ≤ −18°C · laboratorio ≤ 26°C. Le rilevazioni fuori range compaiono in Dashboard.</p>' +
    '</div>' +
    '<div class="card"><h3>📋 Registro temperature</h3>' + righe + '</div>';
}

function registraTemp(){
  var punto = document.getElementById('tPunto').value;
  var gradi = document.getElementById('tGradi').value;
  if(gradi === ''){ toast('Inserisci la temperatura'); return; }
  var op = document.getElementById('tOp').value.trim();
  state.haccp.temp.unshift({ id:uid(), ts:Date.now(), punto:punto, gradi:Number(gradi), operatore:op });
  salva();
  if(fuoriRange(punto, gradi)){
    evento('haccp', '⚠️ HACCP: ' + punto + ' fuori range (' + gradi + '°C)');
  }
  render(); toast('Rilevazione registrata');
}

/* ---------- HACCP: Sanificazione ---------- */
function corpoSanif(){
  var voci = VOCI_SANIF.map(function(v,i){
    return '<label class="all-check"><input type="checkbox" class="sanifV" data-i="' + i + '"> ' + esc(v) + '</label>';
  }).join('');
  var righe = state.haccp.sanif.slice(0,30).map(function(r){
    return '<div class="item"><div class="top"><div>' +
      '<div class="nome">' + dLocDaKey(r.data) + ' <span class="badge ok">' + r.voci.length + '/' + VOCI_SANIF.length + ' voci</span></div>' +
      '<div class="dett">' + esc(r.voci.join(', ')) + (r.operatore ? ' · ' + esc(r.operatore) : '') + '</div>' +
      '</div></div></div>';
  }).join('') || '<p class="muted">Nessuna sanificazione registrata.</p>';

  return '<div class="card"><h3>🧽 Sanificazione giornaliera</h3>' +
    '<div class="all-grid">' + voci + '</div>' +
    '<label class="lbl">Operatore</label><input type="text" id="sOp" placeholder="Nome operatore">' +
    '<button class="btn blocco" onclick="registraSanif()">Registra giornata</button></div>' +
    '<div class="card"><h3>📋 Registro sanificazioni</h3>' + righe + '</div>';
}

function registraSanif(){
  var voci = [];
  document.querySelectorAll('.sanifV').forEach(function(c){
    if(c.checked) voci.push(VOCI_SANIF[Number(c.dataset.i)]);
  });
  if(!voci.length){ toast('Spunta almeno una voce'); return; }
  state.haccp.sanif.unshift({
    id:uid(), data:oggiKey(), voci:voci,
    operatore:document.getElementById('sOp').value.trim()
  });
  salva(); render(); toast('Sanificazione registrata');
}

/* ---------- HACCP: Scadenze ---------- */
function corpoScad(){
  var ordinate = state.haccp.scad.slice().sort(function(a,b){
    return a.scadenza < b.scadenza ? -1 : 1;
  });
  var ok = oggiKey();
  var limite = new Date(); limite.setDate(limite.getDate() + 3);
  var lk = dKey(limite);

  var righe = ordinate.map(function(r){
    var badge = r.scadenza < ok ? '<span class="badge err">SCADUTO</span>'
      : (r.scadenza <= lk ? '<span class="badge warn">in scadenza</span>' : '<span class="badge ok">ok</span>');
    return '<div class="item"><div class="top"><div>' +
      '<div class="nome">' + esc(r.prodotto) + ' ' + badge + '</div>' +
      '<div class="dett">Lotto: ' + esc(r.lotto || '—') + ' · Scade: ' + dLocDaKey(r.scadenza) + '</div>' +
      '</div><button class="btn mini rosso fisso" onclick="eliminaScad(\'' + r.id + '\')">✕</button></div></div>';
  }).join('') || '<p class="muted">Nessun lotto registrato.</p>';

  return '<div class="card"><h3>⏳ Nuovo lotto</h3>' +
    '<label class="lbl">Prodotto / preparazione</label><input type="text" id="scProd" placeholder="Es. Crema pasticcera">' +
    '<div class="riga">' +
      '<div><label class="lbl">Lotto</label><input type="text" id="scLotto" placeholder="L-140726"></div>' +
      '<div><label class="lbl">Scadenza</label><input type="date" id="scData"></div>' +
    '</div>' +
    '<button class="btn blocco" onclick="registraScad()">Registra lotto</button></div>' +
    '<div class="card"><h3>📋 Lotti e scadenze</h3>' + righe + '</div>';
}

function registraScad(){
  var prod = document.getElementById('scProd').value.trim();
  var data = document.getElementById('scData').value;
  if(!prod || !data){ toast('Prodotto e scadenza obbligatori'); return; }
  state.haccp.scad.push({
    id:uid(), prodotto:prod,
    lotto:document.getElementById('scLotto').value.trim(),
    scadenza:data
  });
  salva(); render(); toast('Lotto registrato');
}

function eliminaScad(id){
  state.haccp.scad = state.haccp.scad.filter(function(r){ return r.id !== id; });
  salva(); render();
}

/* CRITICO: salva SEMPRE i campi del form prima di ridisegnare, altrimenti
   il numero WhatsApp appena digitato verrebbe perso a ogni spunta. */
function flushBotForm(){
  var g = function(id){ var e = document.getElementById(id); return e ? e.value : null; };
  var c = state.botCat;
  var v;
  if((v = g('bcWa')) !== null) c.waNumber = v.trim();
  if((v = g('bcShop')) !== null) c.shopUrl = v.trim();
  if((v = g('bcConsV')) !== null && v !== '') c.consegnaVicino = Number(v);
  if((v = g('bcConsL')) !== null && v !== '') c.consegnaLontano = Number(v);
  if((v = g('bcKgP')) !== null && v !== '') c.kgPersona = Number(v);
  if((v = g('bcMin')) !== null && v !== '') c.stimaMin = Number(v);
  if((v = g('bcMax')) !== null && v !== '') c.stimaMax = Number(v);
  document.querySelectorAll('.bc-prezzo').forEach(function(inp){
    var i = Number(inp.dataset.i);
    if(c.listino[i]) c.listino[i].prezzoKg = Number(inp.value) || 0;
  });
  salva();
}

function togTorta(i){
  flushBotForm();
  if(!state.botCat.listino[i]) return;
  state.botCat.listino[i].attivo = !state.botCat.listino[i].attivo;
  salva(); renderBot();
}

function rimuoviTorta(i){
  flushBotForm();
  state.botCat.listino.splice(i, 1);
  salva(); renderBot();
}

function aggiungiTorta(){
  flushBotForm();
  var nome = document.getElementById('bcNuovaTorta').value.trim();
  var pr = Number(document.getElementById('bcNuovoPrezzo').value) || 30;
  if(!nome){ toast('Scrivi il nome della torta'); return; }
  state.botCat.listino.push({ nome:nome, prezzoKg:pr, attivo:true });
  salva(); renderBot(); toast('Torta aggiunta');
}

function aggiungiVoceBot(campo, inputId){
  flushBotForm();
  var v = document.getElementById(inputId).value.trim();
  if(!v){ toast('Campo vuoto'); return; }
  state.botCat[campo] = state.botCat[campo] || [];
  state.botCat[campo].push(v);
  salva(); renderBot();
}

function rimuoviVoceBot(campo, i){
  flushBotForm();
  state.botCat[campo].splice(i, 1);
  salva(); renderBot();
}

function usaShopSuite(){
  flushBotForm();
  state.botCat.shopUrl = urlShopSuite();
  salva(); renderBot();
  toast('Impostato: ' + urlShopSuite());
}

function copiaTesto(t){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(t);
    toast('Link copiato');
  }catch(e){ toast('Copia manualmente: ' + t); }
}

/* Pubblica su bot_app/catalogo con merge:true — non tocca pageUrl che
   WaFagotti pubblica da solo. Verifica la scrittura rileggendo il doc. */
function pubblicaCatalogo(){
  flushBotForm();
  if(!db){ toast('Firebase non disponibile'); return; }
  var c = state.botCat;
  var wa = String(c.waNumber||'').replace(/\D/g, '');
  if(!wa){ toast('Inserisci il numero WhatsApp'); return; }

  var payload = {
    waNumber: wa,
    shopUrl: c.shopUrl || '',
    consegnaVicino: Number(c.consegnaVicino) || 0,
    consegnaLontano: Number(c.consegnaLontano) || 0,
    costoConsegna: Number(c.consegnaVicino) || 0,
    kgPersona: Number(c.kgPersona) || 0.15,
    stimaMin: Number(c.stimaMin) || 85,
    stimaMax: Number(c.stimaMax) || 115,
    listino: c.listino.filter(function(t){ return t.attivo && t.nome; })
      .map(function(t){ return { nome:t.nome, prezzoKg:Number(t.prezzoKg) || 30 }; }),
    farciture: c.farciture || [],
    decorazioni: c.decorazioni || [],
    orari: c.orari || [],
    aggiornato: Date.now()
  };

  db.collection('bot_app').doc('catalogo').set(payload, { merge:true })
    .then(function(){ return db.collection('bot_app').doc('catalogo').get(); })
    .then(function(doc){
      var d = doc.data() || {};
      if(d.waNumber === wa){
        evento('sistema', 'Catalogo bot pubblicato: numero ' + wa + ', ' + payload.listino.length + ' torte');
        toast('✅ Pubblicato — numero ' + wa + ' verificato');
      }else{
        toast('⚠️ Scritto ma non verificato, riprova');
      }
    })
    .catch(function(e){ toast('Errore: ' + e.message); });
}

function salvaTemplate(id, testo){
  var t = state.bot.templates.find(function(x){ return x.id === id; });
  if(!t) return;
  t.testo = testo;
  salva(); toast('Template salvato');
}

function botInvia(){
  var oid = document.getElementById('botOrdine').value;
  var tid = document.getElementById('botTpl').value;
  var o = state.ordini.find(function(x){ return x.id === oid; });
  var t = state.bot.templates.find(function(x){ return x.id === tid; });
  if(!o || !t) return;
  var testo = compilaTemplate(t.testo, o);
  window.open('https://wa.me/' + telWa(o.tel) + '?text=' + encodeURIComponent(testo), '_blank');
}

function nuovoFornitore(){
  var nome = document.getElementById('nfNome').value.trim();
  var tel = document.getElementById('nfTel').value.trim();
  if(!nome || !tel){ toast('Nome e numero obbligatori'); return; }
  state.fornitori.push({ id:uid(), nome:nome, tel:tel, lista:[], storico:[], catalogo:[] });
  salva(); render(); toast('Fornitore aggiunto');
}

function eliminaFornitore(id){
  if(!confirm('Eliminare il fornitore e la sua lista?')) return;
  state.fornitori = state.fornitori.filter(function(f){ return f.id !== id; });
  salva(); render();
}

function aggiungiVoceLista(fid){
  var f = state.fornitori.find(function(x){ return x.id === fid; });
  if(!f) return;
  var nome = document.getElementById('fp-' + fid).value.trim();
  var qta = document.getElementById('fq-' + fid).value.trim() || '1';
  if(!nome){ toast('Scrivi il prodotto'); return; }
  f.lista.push({ nome:nome, qta:qta });
  f.catalogo = f.catalogo || [];
  if(f.catalogo.indexOf(nome) < 0) f.catalogo.push(nome);
  salva(); render();
}

function aggiungiDaCatalogo(fid, i){
  var f = state.fornitori.find(function(x){ return x.id === fid; });
  if(!f || !f.catalogo || !f.catalogo[i]) return;
  var qta = prompt('Quantità per: ' + f.catalogo[i], '1');
  if(qta === null) return;
  f.lista.push({ nome:f.catalogo[i], qta:(qta.trim() || '1') });
  salva(); render();
}

function rimuoviVoceLista(fid, i){
  var f = state.fornitori.find(function(x){ return x.id === fid; });
  if(!f) return;
  f.lista.splice(i,1);
  salva(); render();
}

function inviaListaWa(fid){
  var f = state.fornitori.find(function(x){ return x.id === fid; });
  if(!f || !f.lista.length) return;
  var testo = 'Ordine da ' + (state.settings.nome || 'pasticceria') + ' — ' + dLocDaKey(oggiKey()) + ':\n' +
    f.lista.map(function(r){ return '• ' + r.nome + ' — ' + r.qta; }).join('\n') +
    '\nGrazie!';
  window.open('https://wa.me/' + telWa(f.tel) + '?text=' + encodeURIComponent(testo), '_blank');
  if(confirm('Lista aperta su WhatsApp. Segnare come inviata e svuotare la lista?')){
    f.storico = f.storico || [];
    f.storico.unshift({ ts:Date.now(), n:f.lista.length });
    evento('fornitore', 'Lista inviata a ' + f.nome + ' (' + f.lista.length + ' articoli)');
    f.lista = [];
    salva(); render();
  }
}

function copiaLink(){
  var inp = document.getElementById('setLink');
  inp.select();
  inp.setSelectionRange(0, 9999);
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(inp.value);
    }else{
      document.execCommand('copy');
    }
    toast('Link copiato');
  }catch(e){ toast('Copia manualmente il link'); }
}

function esportaJson(){
  var blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'workmor-suite-backup-' + oggiKey() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importaJson(inp){
  var file = inp.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var dati = JSON.parse(reader.result);
      if(!dati.settings){ toast('File non valido'); return; }
      state = dati;
      salva(); render(); toast('Dati importati');
    }catch(e){ toast('File non valido'); }
  };
  reader.readAsText(file);
  inp.value = '';
}

function azzeraTutto(){
  if(!confirm('Azzerare TUTTI i dati della suite? Operazione irreversibile.')) return;
  if(!confirm('Confermi davvero? Verranno persi turni, ordini, prodotti, fornitori e registri HACCP.')) return;
  state = statoDefault();
  salva(); render(); toast('Dati azzerati');
}
</script>
<script>
/* ============================================================
   VISTA CLIENTE (#negozio / #ordina)
   ============================================================ */
function renderCliente(){
  document.getElementById('hdr').style.display = 'none';
  document.body.classList.add('cliente');
  document.querySelectorAll('.view').forEach(function(s){
    s.classList.toggle('show', s.id === 'v-cliente');
  });
  if(modCliente === 'negozio') renderClienteShop();
  else renderClienteTorta();
}

function heroCliente(sottotitolo){
  return '<div class="cliente-hero" style="margin:-16px -16px 16px;border-radius:0 0 16px 16px">' +
    '<h1>' + esc(state.settings.nome) + ' <span>·</span></h1>' +
    '<p>' + sottotitolo + '</p></div>';
}

/* ---------- Shop cliente ---------- */
/* ── Vetrina cliente: catalogo da Firestore (shop_app/catalogo) ── */
var SHOPCLI = { caricato:false, fallito:false, prodotti:[], waNumber:'', nomeAtt:'' };

function caricaShopCliente(){
  if(SHOPCLI.caricato || SHOPCLI.fallito) return;
  if(!db){ SHOPCLI.fallito = true; shopFallbackLocale(); return; }
  db.collection('shop_app').doc('catalogo').get().then(function(doc){
    if(doc.exists && (doc.data().prodotti||[]).length){
      var d = doc.data();
      SHOPCLI.prodotti = d.prodotti;
      SHOPCLI.spedizione = d.spedizione || { attiva:false, roma:0, fuori:0 };
      SHOPCLI.waNumber = d.waNumber || '';
      SHOPCLI.nomeAtt = d.nome || '';
      SHOPCLI.caricato = true;
    }else{
      SHOPCLI.fallito = true; shopFallbackLocale();
    }
    renderCliente();
  }).catch(function(){
    SHOPCLI.fallito = true; shopFallbackLocale(); renderCliente();
  });
}

/* Se il catalogo online non c'è (o Firestore giù), uso i prodotti locali:
   così la demo sullo stesso dispositivo funziona comunque. */
function shopFallbackLocale(){
  SHOPCLI.prodotti = state.prodotti.filter(function(p){ return p.attivo && p.cat === 'negozio'; })
    .map(function(p){
      return { nome:p.nome, desc:p.desc||'', foto:p.foto||'', prezzo:p.prezzo, um:p.um,
        gusti:(p.varianti||[]).filter(function(v){ return v.disp; }).map(function(v){ return v.nome; }),
        formati:p.formati||[], stripe:p.stripe||'' };
    });
  SHOPCLI.spedizione = state.shopSped || { attiva:false, roma:0, fuori:0 };
  SHOPCLI.waNumber = state.botCat.waNumber || '';
  SHOPCLI.nomeAtt = state.settings.nome || '';
  SHOPCLI.caricato = true;
}

var selGusto = {};   /* indice prodotto → gusto scelto */
var selFormato = {}; /* indice prodotto → indice formato scelto */

function prezzoSel(p, i){
  if((p.formati||[]).length){
    var fi = selFormato[i] !== undefined ? selFormato[i] : 0;
    return Number(p.formati[fi].prezzo) || 0;
  }
  return Number(p.prezzo) || 0;
}

function renderClienteShop(){
  if(!SHOPCLI.caricato && !SHOPCLI.fallito){
    document.getElementById('v-cliente').innerHTML =
      heroCliente('Ordina online · ritiro in negozio') +
      '<div class="card" style="text-align:center;padding:26px"><p class="muted">Carico la vetrina…</p></div>';
    caricaShopCliente();
    return;
  }

  var prodotti = SHOPCLI.prodotti;
  var cards = prodotti.length
    ? prodotti.map(function(p, i){
        var foto = p.foto
          ? '<img src="' + esc(p.foto) + '" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:8px" onerror="this.style.display=\'none\'">'
          : '';
        var gusti = (p.gusti||[]).length
          ? '<div class="gusti">' + p.gusti.map(function(g){
              var sel = selGusto[i] === g ? ' sel' : '';
              return '<button class="gusto' + sel + '" onclick="scegliGusto(' + i + ',\'' + esc(g).replace(/'/g,"\\'") + '\')">' + esc(g) + '</button>';
            }).join('') + '</div>'
          : '';
        var formati = (p.formati||[]).length
          ? '<div class="gusti">' + p.formati.map(function(f, fi){
              var sel = (selFormato[i] !== undefined ? selFormato[i] : 0) === fi ? ' sel' : '';
              return '<button class="gusto' + sel + '" onclick="scegliFormato(' + i + ',' + fi + ')">' + esc(f.nome) + ' · ' + euro(f.prezzo) + '</button>';
            }).join('') + '</div>'
          : '';
        var nelCarrello = carrello.filter(function(c){ return c.idx === i; })
          .reduce(function(t,c){ return t + c.qta; }, 0);
        return '<div class="prodotto-card">' + foto +
          '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px">' +
            '<div class="pnome">' + esc(p.nome) + '</div>' +
            '<div class="pprezzo">' + euro(prezzoSel(p, i)) + (p.um === 'kg' ? '/kg' : '') + '</div>' +
          '</div>' +
          (p.desc ? '<p class="muted" style="margin-top:2px">' + esc(p.desc) + '</p>' : '') +
          formati + gusti +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">' +
            '<span class="muted">' + (nelCarrello ? nelCarrello + ' nel carrello' : '') + '</span>' +
            '<button class="btn" onclick="aggiungiCarrello(' + i + ')">Aggiungi 🛒</button>' +
          '</div></div>';
      }).join('')
    : '<div class="card"><p class="muted">Il negozio online è momentaneamente vuoto. Torna presto!</p></div>';

  var nTot = carrello.reduce(function(t,c){ return t + c.qta; }, 0);
  var eTot = carrello.reduce(function(t,c){ return t + c.prezzo * c.qta; }, 0);
  var bar = nTot
    ? '<div class="carrello-bar"><div class="tot">' + nTot + ' art. · ' + euro(eTot) + '</div>' +
      '<button class="btn oro" onclick="mostraCheckout()">Concludi ordine →</button></div>'
    : '';

  document.getElementById('v-cliente').innerHTML =
    heroCliente('Ordina online · ritiro in negozio') + cards +
    '<div id="checkoutBox"></div>' + bar +
    '<footer class="firma">powered by Fagotti Suite</footer>';
}

function scegliGusto(i, nome){
  selGusto[i] = nome;
  render();
}

function scegliFormato(i, fi){
  selFormato[i] = fi;
  render();
}

function aggiungiCarrello(i){
  var p = SHOPCLI.prodotti[i];
  if(!p) return;
  if((p.gusti||[]).length && !selGusto[i]){ toast('Scegli prima il gusto'); return; }
  var fi = (p.formati||[]).length ? (selFormato[i] !== undefined ? selFormato[i] : 0) : -1;
  var formato = fi >= 0 ? p.formati[fi].nome : '';
  var stripe = fi >= 0 ? (p.formati[fi].stripe || p.stripe || '') : (p.stripe || '');
  var gusto = selGusto[i] || '';
  var esist = carrello.find(function(c){ return c.idx === i && c.gusto === gusto && c.formato === formato; });
  if(esist) esist.qta++;
  else carrello.push({ idx:i, nome:p.nome, gusto:gusto, formato:formato,
    prezzo:prezzoSel(p, i), stripe:stripe, qta:1 });
  render();
  toast('Aggiunto: ' + p.nome + (formato ? ' ' + formato : '') + (gusto ? ' (' + gusto + ')' : ''));
}

function etichettaRiga(c){
  return c.nome + (c.formato ? ' · ' + c.formato : '') + (c.gusto ? ' · ' + c.gusto : '');
}

function mostraCheckout(){
  var righe = carrello.map(function(c, i){
    return '<div class="turno-riga">' +
      '<div class="dip">' + esc(etichettaRiga(c)) + '<div class="dett">' + euro(c.prezzo) + ' cad.</div></div>' +
      '<div class="qta-box fisso">' +
        '<button onclick="cambiaQta(' + i + ',-1)">−</button>' +
        '<span class="q">' + c.qta + '</span>' +
        '<button onclick="cambiaQta(' + i + ',1)">+</button>' +
      '</div></div>';
  }).join('');
  var domani = new Date(); domani.setDate(domani.getDate() + 1);
  var eTot = carrello.reduce(function(t,c){ return t + c.prezzo * c.qta; }, 0);

  var sped = SHOPCLI.spedizione || { attiva:false };
  var boxSped = '';
  if(sped.attiva){
    boxSped =
      '<label class="lbl">Come lo vuoi?</label>' +
      '<select id="ckModo" onchange="document.getElementById(\'ckSpedBox\').style.display = this.value === \'consegna\' ? \'block\' : \'none\'">' +
        '<option value="ritiro">🏪 Ritiro in negozio (gratis)</option>' +
        '<option value="consegna">🚚 Spedizione a domicilio</option>' +
      '</select>' +
      '<div id="ckSpedBox" style="display:none">' +
        '<label class="lbl">CAP di consegna</label>' +
        '<input type="text" id="ckCap" inputmode="numeric" maxlength="5" placeholder="00185" oninput="aggiornaZonaCap()">' +
        '<div class="muted" id="ckZonaInfo" style="margin-top:4px"></div>' +
        '<label class="lbl">Indirizzo di consegna</label>' +
        '<input type="text" id="ckIndirizzo" placeholder="Via, numero civico, città">' +
      '</div>';
  }

  document.getElementById('checkoutBox').innerHTML =
    '<div class="card"><h3>🛒 Il tuo ordine · ' + euro(eTot) + '</h3>' + righe +
      '<label class="lbl">Il tuo nome</label><input type="text" id="ckNome" placeholder="Nome e cognome">' +
      '<label class="lbl">Telefono</label><input type="tel" id="ckTel" placeholder="3XX XXXXXXX">' +
      boxSped +
      '<label class="lbl">Giorno di ritiro / consegna</label><input type="date" id="ckRitiro" min="' + oggiKey() + '" value="' + dKey(domani) + '">' +
      '<label class="lbl">Note (opzionale)</label><textarea id="ckNote" placeholder="Es. passo verso le 18"></textarea>' +
      '<p class="muted" style="margin-top:8px">Dopo l\'invio potrai pagare online (se disponibile), su WhatsApp o direttamente in negozio.</p>' +
      '<button class="btn blocco" onclick="confermaOrdineShop()">✅ Invia ordine</button>' +
    '</div>';
  document.getElementById('checkoutBox').scrollIntoView({ behavior:'smooth' });
}

function cambiaQta(i, delta){
  carrello[i].qta += delta;
  if(carrello[i].qta <= 0) carrello.splice(i,1);
  render();
  if(carrello.length) mostraCheckout();
}

function confermaOrdineShop(){
  var nome = document.getElementById('ckNome').value.trim();
  var tel = document.getElementById('ckTel').value.trim();
  if(!nome || !tel){ toast('Nome e telefono obbligatori'); return; }
  if(!carrello.length){ toast('Carrello vuoto'); return; }

  var articoli = carrello.map(function(c){
    return { nome:c.nome, formato:c.formato, gusto:c.gusto, qta:c.qta, prezzo:c.prezzo };
  });
  var eTot = carrello.reduce(function(t,c){ return t + c.prezzo * c.qta; }, 0);

  var consegna = null;
  var modoEl = document.getElementById('ckModo');
  if(modoEl && modoEl.value === 'consegna'){
    var cap = document.getElementById('ckCap').value.trim();
    var zona = zonaDaCap(cap);
    if(!zona){ toast('Inserisci un CAP valido (5 cifre)'); return; }
    var indirizzo = document.getElementById('ckIndirizzo').value.trim();
    if(!indirizzo){ toast('Inserisci l\'indirizzo di consegna'); return; }
    var costo = Number(zona === 'roma' ? SHOPCLI.spedizione.roma : SHOPCLI.spedizione.fuori) || 0;
    consegna = { zona:(zona === 'roma' ? 'Roma' : 'Fuori Roma'), cap:cap, costo:costo, indirizzo:indirizzo };
    eTot += costo;
  }

  var ritiro = document.getElementById('ckRitiro').value;
  var note = document.getElementById('ckNote').value.trim();
  var ordine = {
    tipo:'shop', nome:nome, telefono:tel, data:ritiro, note:note,
    articoli:articoli, consegna:consegna, totale:Math.round(eTot * 100) / 100,
    pagamento:'in negozio', creato:Date.now()
  };
  var daPagare = carrello.filter(function(c){ return c.stripe; });

  function fine(){
    schermataGrazieShop(nome, ritiro, daPagare, ordine);
    carrello = []; selGusto = {}; selFormato = {};
  }
  if(db){
    db.collection('ordini_online').add(ordine).then(fine).catch(function(){
      salvaOrdineShopLocale(ordine); fine();
    });
  }else{
    salvaOrdineShopLocale(ordine); fine();
  }
}

function salvaOrdineShopLocale(ordine){
  state.ordini.unshift({
    id:uid(), numero:numeroOrdine(), canale:'shop', cliente:ordine.nome, tel:ordine.telefono,
    righe:ordine.articoli.map(function(a){ return { nome:a.nome + (a.formato ? ' ' + a.formato : ''), variante:a.gusto, qta:a.qta, prezzo:a.prezzo }; }),
    ritiro:ordine.data, ora:'', note:ordine.note, totale:ordine.totale,
    stato:'nuovo', creato:ordine.creato
  });
  salva();
  evento('ordine', 'Nuovo ordine dallo Shop: ' + ordine.nome);
}

function schermataGrazieShop(nome, ritiro, daPagare, ordine){
  var stripeBtns = daPagare.map(function(c){
    return '<button class="btn blocco" onclick="window.open(\'' + esc(c.stripe) + '\',\'_blank\')">💳 Paga ora: ' +
      esc(etichettaRiga(c)) + (c.qta > 1 ? ' × ' + c.qta : '') + '</button>';
  }).join('');

  var waNum = telWa(SHOPCLI.waNumber || '');
  var waBtn = '';
  if(waNum){
    var testo = '🛍️ Ordine Shop ' + (SHOPCLI.nomeAtt || '') + '\n' +
      '👤 ' + nome + ' · 📞 ' + ordine.telefono + '\n' +
      (ordine.consegna
        ? '🚚 Spedizione ' + ordine.consegna.zona + ' (' + ordine.consegna.cap + '): ' + ordine.consegna.indirizzo + ' — +' + euro(ordine.consegna.costo) + '\n'
        : '🏪 Ritiro in negozio\n') +
      '📅 Giorno: ' + dLocDaKey(ritiro) + '\n' +
      ordine.articoli.map(function(a){
        return '• ' + a.qta + '× ' + a.nome + (a.formato ? ' ' + a.formato : '') + (a.gusto ? ' (' + a.gusto + ')' : '');
      }).join('\n') +
      '\n💰 Totale: ' + euro(ordine.totale) +
      (ordine.note ? '\n📝 ' + ordine.note : '');
    waBtn = '<button class="btn verde blocco" onclick="window.open(\'https://wa.me/' + waNum +
      '?text=' + encodeURIComponent(testo).replace(/'/g, '%27') + '\',\'_blank\')">💬 Invia ordine su WhatsApp</button>';
  }

  document.getElementById('v-cliente').innerHTML =
    heroCliente('Ordine ricevuto!') +
    '<div class="card" style="text-align:center;padding:26px 16px">' +
      '<div style="font-size:44px">🎉</div>' +
      '<h3 style="justify-content:center;margin-top:8px">Grazie ' + esc(nome) + '!</h3>' +
      '<p class="muted">Il tuo ordine è registrato. Ti aspettiamo il ' + dLocDaKey(ritiro) + '.</p>' +
    '</div>' +
    (stripeBtns ? '<div class="card"><h3>💳 Paga online (opzionale)</h3>' + stripeBtns + '</div>' : '') +
    (waBtn ? '<div class="card"><h3>💬 Oppure avvisa la pasticceria</h3>' + waBtn + '</div>' : '') +
    '<div class="card"><p class="muted" style="text-align:center">In alternativa paghi comodamente in negozio al ritiro. 💛</p></div>' +
    '<footer class="firma">powered by Fagotti Suite</footer>';
}

/* ---------- Ordina torta cliente ---------- */
function renderClienteTorta(){
  var torte = state.prodotti.filter(function(p){ return p.attivo && p.cat === 'torta'; });
  var torteOpts = torte.map(function(p){
    return '<option value="' + p.id + '">' + esc(p.nome) + ' — ' + euro(p.prezzo) + (p.um === 'kg' ? '/kg' : '') + '</option>';
  }).join('');

  var selTorta = torte.length
    ? '<label class="lbl">Scegli la torta</label><select id="ctTorta" onchange="renderGustiTorta()">' + torteOpts + '</select>' +
      '<div id="ctGusti"></div>'
    : '<label class="lbl">Descrivi la torta che desideri</label><textarea id="ctLibera" placeholder="Es. Sacher da 1kg con scritta Auguri"></textarea>';

  var domani = new Date(); domani.setDate(domani.getDate() + 2);

  document.getElementById('v-cliente').innerHTML =
    heroCliente('Ordina la tua torta') +
    '<div class="card"><h3>🎂 La tua torta</h3>' +
      selTorta +
      '<label class="lbl">Peso</label>' +
      '<select id="ctPeso"><option>500 g</option><option selected>1 kg</option><option>1,5 kg</option><option>2 kg</option></select>' +
      '<label class="lbl">Giorno di ritiro</label>' +
      '<input type="date" id="ctRitiro" min="' + oggiKey() + '" value="' + dKey(domani) + '">' +
      '<label class="lbl">Il tuo nome</label><input type="text" id="ctNome" placeholder="Nome e cognome">' +
      '<label class="lbl">Telefono</label><input type="tel" id="ctTel" placeholder="3XX XXXXXXX">' +
      '<label class="lbl">Note / scritta sulla torta (opzionale)</label>' +
      '<textarea id="ctNote" placeholder="Es. scritta Auguri Marco, senza granella"></textarea>' +
      '<button class="btn blocco" onclick="confermaOrdineTorta()">✅ Invia richiesta</button>' +
    '</div>' +
    '<footer class="firma">powered by Fagotti Suite</footer>';

  renderGustiTorta();
}

function renderGustiTorta(){
  var box = document.getElementById('ctGusti');
  if(!box) return;
  var sel = document.getElementById('ctTorta');
  if(!sel){ box.innerHTML = ''; return; }
  var p = state.prodotti.find(function(x){ return x.id === sel.value; });
  var gusti = p ? (p.varianti||[]).filter(function(v){ return v.disp; }) : [];
  box.innerHTML = gusti.length
    ? '<label class="lbl">Gusto</label><select id="ctGusto">' +
      gusti.map(function(v){ return '<option>' + esc(v.nome) + '</option>'; }).join('') + '</select>'
    : '';
}

function confermaOrdineTorta(){
  var nome = document.getElementById('ctNome').value.trim();
  var tel = document.getElementById('ctTel').value.trim();
  if(!nome || !tel){ toast('Nome e telefono obbligatori'); return; }

  var descr, righe = null;
  var selT = document.getElementById('ctTorta');
  var peso = document.getElementById('ctPeso').value;
  var gustoEl = document.getElementById('ctGusto');
  var gusto = gustoEl ? gustoEl.value : '';

  if(selT){
    var p = state.prodotti.find(function(x){ return x.id === selT.value; });
    descr = (p ? p.nome : 'Torta') + ' · ' + peso + (gusto ? ' · ' + gusto : '');
    righe = [{ nome:(p ? p.nome : 'Torta') + ' ' + peso, variante:gusto, qta:1, prezzo:(p ? p.prezzo : 0) }];
  }else{
    var libera = document.getElementById('ctLibera').value.trim();
    if(!libera){ toast('Descrivi la torta'); return; }
    descr = libera + ' · ' + peso;
  }

  var o = {
    id:uid(), numero:numeroOrdine(), canale:'torta', cliente:nome, tel:tel, ora:'',
    righe:righe, descrizione:descr,
    ritiro:document.getElementById('ctRitiro').value,
    note:document.getElementById('ctNote').value.trim(),
    stato:'nuovo', creato:Date.now()
  };
  state.ordini.unshift(o);
  salva();
  evento('ordine', 'Nuova richiesta torta ' + o.numero + ': ' + nome + ' — ' + descr.slice(0,60));

  document.getElementById('v-cliente').innerHTML =
    heroCliente('Richiesta inviata!') +
    '<div class="card" style="text-align:center;padding:30px 16px">' +
      '<div style="font-size:44px">🎂</div>' +
      '<h3 style="justify-content:center;margin-top:8px">Grazie ' + esc(nome) + '!</h3>' +
      '<p class="muted">La richiesta è stata registrata: ti contatteremo per la conferma. Ritiro previsto il ' + dLocDaKey(o.ritiro) + '.</p>' +
    '</div>' +
    '<footer class="firma">powered by Fagotti Suite</footer>';
}

/* ============================================================
   AVVIO
   ============================================================ */
function avvia(){
  var h = location.hash.replace('#','');
  /* Alias per i link di vecchio formato (era hub): ?shop=1 → vetrina cliente */
  if(!h && /[?&]shop=1/.test(location.search)) h = 'negozio';
  if(h === 'negozio' || h === 'ordina'){
    modCliente = h;
  }
  if(!modCliente && !sessionStorage.getItem('fs_auth')){
    document.getElementById('login').classList.remove('hidden');
    var pi = document.getElementById('loginPwd');
    pi.addEventListener('keydown', function(e){ if(e.key === 'Enter') doLoginSuite(); });
    setTimeout(function(){ pi.focus(); }, 100);
  }
  var d = new Date();
  document.getElementById('hdrData').textContent =
    d.toLocaleDateString('it-IT', { weekday:'short', day:'2-digit', month:'2-digit', year:'numeric' });
  if(!modCliente) ascoltaFirestore();
  render();
}

window.addEventListener('hashchange', function(){
  location.reload();
});

avvia();
</script>
</body>
